<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0e0b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="description" content="Casino Royal — 11 juegos clásicos"/>
<title>Casino Royal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>

<!-- ████ LOBBY ████ -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-bg"><div class="felt-tex"></div><div id="particles"></div></div>
  <header class="lobby-header">
    <div class="logo-block">
      <div class="logo-suits">♠ ♥ ♦ ♣</div>
      <h1 class="logo-title">Casino Royal</h1>
    </div>
    <button class="btn-ico" id="btn-gstats" title="Estadísticas globales">📊</button>
  </header>
  <div class="lobby-body">
    <p class="lobby-sub">Elige tu juego</p>
    <div class="lobby-grid" id="lobby-grid"></div>
  </div>
</div>

<!-- ████ GAME ████ -->
<div id="screen-game" class="screen">
  <header class="g-header">
    <button class="btn-ico" id="btn-home">⌂</button>
    <span class="g-title" id="g-title"></span>
    <button class="btn-ico" id="btn-help">?</button>
  </header>
  <div id="g-container"></div>
</div>

<!-- ████ GLOBAL STATS ████ -->
<div id="screen-gstats" class="screen">
  <header class="g-header">
    <button class="btn-ico" id="btn-back-gs">←</button>
    <span class="g-title">Estadísticas</span>
    <div style="display:flex;gap:6px">
      <button class="btn-ico" id="btn-exp" title="Exportar">⬇</button>
      <button class="btn-ico" id="btn-imp" title="Importar">⬆</button>
    </div>
  </header>
  <div class="gs-body" id="gs-body"></div>
  <input type="file" id="imp-file" accept=".json" style="display:none"/>
</div>

<!-- ████ HELP MODAL ████ -->
<div id="help-modal" class="modal-ov" hidden>
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="help-title">Ayuda</h3>
      <button class="btn-ico" id="btn-close-help">✕</button>
    </div>
    <div class="modal-body" id="help-body"></div>
  </div>
</div>

<!-- ████ TOAST ████ -->
<div id="toast" class="toast"></div>

<!-- CORE -->
<script src="js/core/deck.js"></script>
<script src="js/core/stats.js"></script>
<!-- GAMES (se agregan en lotes 1-3) -->
<script src="js/games/adivina.js"></script>
<script src="js/games/blackjack.js"></script>
<script src="js/games/memory.js"></script>
<script src="js/games/cards2048.js"></script>
<script src="js/games/poker.js"></script>
<script src="js/games/yahtzee.js"></script>
<script src="js/games/ruleta.js"></script>
<script src="js/games/slots.js"></script>
<script src="js/games/guerra.js"></script>
<script src="js/games/bingo.js"></script>
<script src="js/games/solitario.js"></script>
<!-- APP BOOTSTRAP (siempre al final) -->
<script src="js/core/app.js"></script>
</body>
</html>
